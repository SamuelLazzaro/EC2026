<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Meal Orders · European Inline Speed Skating Championships 2026</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap"
		rel="stylesheet">
	<style>
		:root {
			--bg: #EEF2F6;
			--surface: #FFFFFF;
			--ink: #0A1628;
			--muted: #5C6B7A;
			--line: #E1E7EE;
			--primary: #14325C;
			--primary-dark: #0A1628;
			--accent: #C9A84C;
			--gold: #E19A00;
			--gold-soft: #FCF3DE;
			--gold-line: #F0D89A;
			--gold-ink: #8a5d00;
			--red: #C23B2E;
			--red-soft: #FBE9E6;
			--red-line: #EEC0B9;
			--red-ink: #8a271c;
			--ok: #1E824C;
			--display: "Montserrat", system-ui, sans-serif;
			--body: "Inter", system-ui, -apple-system, sans-serif;
			--radius: 14px;
		}

		* {
			box-sizing: border-box
		}

		html,
		body {
			margin: 0;
			padding: 0
		}

		body {
			background: var(--bg);
			color: var(--ink);
			font-family: var(--body);
			line-height: 1.5;
			-webkit-font-smoothing: antialiased;
			padding: 24px 16px 64px;
		}

		.wrap {
			max-width: 660px;
			margin: 0 auto
		}

		/* ---- Header ---- */
		.masthead {
			background: var(--ink);
			color: #fff;
			border-radius: var(--radius);
			padding: 22px 22px 20px;
			position: relative;
			overflow: hidden;
			border-top: 4px solid var(--accent);
		}

		.mast-top {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 12px;
			margin-bottom: 8px
		}

		.eyebrow {
			font-family: var(--body);
			font-size: 11px;
			font-weight: 600;
			letter-spacing: .14em;
			text-transform: uppercase;
			color: var(--accent);
			margin: 0;
		}

		/* ---- Language FAB (floating language switcher) ---- */
		.lang-fab {
			display: flex;
			position: fixed;
			right: 20px;
			bottom: 20px;
			z-index: 300;
			flex-direction: column;
			align-items: flex-end;
			gap: 8px;
		}

		.lang-fab-btn {
			display: flex;
			align-items: center;
			gap: 8px;
			background: var(--accent);
			color: var(--ink);
			border: none;
			border-radius: 999px;
			padding: 11px 18px;
			font-family: var(--display);
			font-size: 14px;
			font-weight: 700;
			letter-spacing: .04em;
			cursor: pointer;
			box-shadow: 0 6px 18px rgba(16, 35, 58, .28);
			transition: transform .12s, box-shadow .12s;
			white-space: nowrap;
			user-select: none;
		}

		.lang-fab-btn:active {
			transform: scale(.95);
		}

		.lang-fab .flag {
			width: 22px;
			height: auto;
			border-radius: 2px;
			display: block;
			flex-shrink: 0;
			box-shadow: 0 0 0 1px rgba(0, 0, 0, .12);
		}

		.lang-fab-menu {
			display: none;
			flex-direction: column;
			gap: 4px;
			background: var(--surface);
			border: 1px solid var(--line);
			border-radius: var(--radius);
			padding: 6px;
			box-shadow: 0 12px 28px rgba(16, 35, 58, .18);
			opacity: 0;
			transform: translateY(8px) scale(.95);
			transform-origin: bottom right;
			transition: opacity .2s ease, transform .2s ease;
		}

		.lang-fab-menu.open {
			opacity: 1;
			transform: translateY(0) scale(1);
		}

		.lang-fab-item {
			display: flex;
			align-items: center;
			gap: 10px;
			background: transparent;
			color: var(--ink);
			border: none;
			border-radius: 10px;
			padding: 9px 20px 9px 12px;
			font-family: var(--display);
			font-size: 14px;
			font-weight: 600;
			letter-spacing: .04em;
			cursor: pointer;
			text-align: left;
			transition: background .12s, color .12s;
		}

		.lang-fab-item.active {
			background: var(--accent);
			color: var(--ink);
		}

		@media (pointer: fine) {
			.lang-fab-item:hover {
				background: var(--gold-soft);
				color: var(--gold-ink);
			}
		}

		.event-logo {
			display: block;
			width: 100%;
			max-width: 340px;
			height: auto;
			margin: 2px 0;
		}

		/* ---- Day picker ---- */
		.daybar {
			background: var(--surface);
			border: 1px solid var(--line);
			border-radius: var(--radius);
			margin-top: 14px;
			padding: 14px 16px;
			display: flex;
			align-items: center;
			gap: 14px;
			flex-wrap: wrap;
		}

		.daybar .lab {
			font-size: 12px;
			font-weight: 600;
			letter-spacing: .06em;
			text-transform: uppercase;
			color: var(--muted)
		}

		.matchday {
			display: flex;
			align-items: baseline;
			gap: 10px;
			margin-left: auto
		}

		.matchday .wd {
			font-family: var(--display);
			font-weight: 700;
			font-size: 15px;
			color: var(--primary)
		}

		.matchday .dt {
			font-family: var(--display);
			font-weight: 700;
			font-size: 28px;
			letter-spacing: -.02em
		}

		.matchday .mo {
			font-size: 13px;
			color: var(--muted);
			font-weight: 600
		}

		select,
		input[type=number],
		textarea {
			font-family: var(--body);
			font-size: 15px;
			color: var(--ink);
			background: #fff;
			border: 1.5px solid var(--line);
			border-radius: 10px;
			padding: 11px 12px;
			width: 100%;
			transition: border-color .15s, box-shadow .15s;
		}

		select:focus,
		input:focus,
		textarea:focus {
			outline: none;
			border-color: var(--primary);
			box-shadow: 0 0 0 3px rgba(20, 50, 92, .18);
		}

		#daySelect {
			max-width: 320px
		}

		/* ---- Cards ---- */
		.card {
			background: var(--surface);
			border: 1px solid var(--line);
			border-radius: var(--radius);
			margin-top: 14px;
			padding: 18px 18px 20px;
		}

		.field-label {
			display: block;
			font-size: 12px;
			font-weight: 700;
			letter-spacing: .06em;
			text-transform: uppercase;
			color: var(--muted);
			margin-bottom: 8px;
		}

		.req {
			color: var(--red);
			font-weight: 700
		}

		.meal-head {
			display: flex;
			align-items: center;
			gap: 10px;
			margin: 6px 0 2px;
			font-family: var(--display);
			font-weight: 700;
			font-size: 16px;
		}

		.meal-head .tag {
			width: 22px;
			height: 4px;
			border-radius: 2px
		}

		.meal-head.lunch {
			color: var(--gold-ink)
		}

		.meal-head.lunch .tag {
			background: var(--gold)
		}

		.meal-head.dinner {
			color: var(--primary)
		}

		.meal-head.dinner .tag {
			background: var(--primary)
		}

		.opt {
			display: flex;
			align-items: center;
			gap: 14px;
			padding: 13px 0;
			border-top: 1px solid var(--line)
		}

		.opt:first-of-type {
			border-top: none
		}

		.opt-info {
			flex: 1;
			min-width: 0
		}

		.opt-name {
			font-weight: 700;
			font-size: 14px;
			display: flex;
			align-items: center;
			gap: 8px;
			flex-wrap: wrap
		}

		.veg {
			font-size: 10px;
			font-weight: 700;
			letter-spacing: .06em;
			text-transform: uppercase;
			color: var(--ok);
			border: 1px solid #B9DBC8;
			background: #EBF6EF;
			border-radius: 999px;
			padding: 2px 7px;
		}

		.opt-dishes {
			color: var(--muted);
			font-size: 13px;
			margin-top: 3px
		}

		.lunch-edge {
			box-shadow: inset 4px 0 0 var(--gold);
			padding-left: 12px;
			margin-left: -12px;
			border-radius: 2px
		}

		.dinner-edge {
			box-shadow: inset 4px 0 0 var(--primary);
			padding-left: 12px;
			margin-left: -12px;
			border-radius: 2px
		}

		/* ---- Stepper ---- */
		.stepper {
			display: flex;
			align-items: center;
			flex: 0 0 auto
		}

		.stepper button {
			width: 38px;
			height: 40px;
			border: 1.5px solid var(--line);
			background: #fff;
			font-size: 20px;
			line-height: 1;
			color: var(--primary);
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: background .12s, border-color .12s;
		}

		.stepper button:hover {
			background: #F3F7FB;
			border-color: var(--primary)
		}

		.stepper button.minus {
			border-radius: 10px 0 0 10px
		}

		.stepper button.plus {
			border-radius: 0 10px 10px 0
		}

		.stepper input {
			width: 56px;
			height: 40px;
			text-align: center;
			border-left: none;
			border-right: none;
			border-radius: 0;
			padding: 0;
			font-weight: 700;
			font-size: 16px;
			-moz-appearance: textfield;
		}

		.stepper input::-webkit-outer-spin-button,
		.stepper input::-webkit-inner-spin-button {
			-webkit-appearance: none;
			margin: 0
		}

		.stepper input.has {
			color: var(--primary);
			background: #F6FAFE
		}

		textarea {
			min-height: 96px;
			resize: vertical
		}

		.hint {
			font-size: 12.5px;
			color: var(--muted);
			margin-top: 7px
		}

		/* ---- Footer / submit ---- */
		.footer-bar {
			position: sticky;
			bottom: 0;
			margin-top: 16px;
			background: var(--surface);
			border: 1px solid var(--line);
			border-radius: var(--radius);
			padding: 14px 16px;
			display: flex;
			align-items: center;
			gap: 14px;
			flex-wrap: wrap;
			box-shadow: 0 -6px 20px rgba(16, 35, 58, .06);
		}

		.total {
			font-size: 13px;
			color: var(--muted);
			font-weight: 600
		}

		.total b {
			font-family: var(--display);
			font-size: 22px;
			color: var(--ink);
			font-weight: 700;
			margin-right: 5px
		}

		.btn {
			margin-left: auto;
			background: var(--primary);
			color: #fff;
			border: none;
			border-radius: 10px;
			font-family: var(--body);
			font-weight: 700;
			font-size: 15px;
			padding: 13px 26px;
			cursor: pointer;
			transition: background .15s, transform .05s;
		}

		.btn:hover {
			background: var(--primary-dark)
		}

		.btn:active {
			transform: translateY(1px)
		}

		.btn:disabled {
			background: #9DB3C9;
			cursor: not-allowed
		}

		.msg {
			margin-top: 12px;
			padding: 12px 14px;
			border-radius: 10px;
			font-size: 14px;
			display: none
		}

		.msg.err {
			background: var(--red-soft);
			border: 1px solid var(--red-line);
			color: var(--red-ink)
		}

		.privacy {
			font-size: 11.5px;
			color: var(--muted);
			margin-top: 18px;
			text-align: center;
			line-height: 1.5
		}

		.hp {
			position: absolute;
			left: -9999px;
			width: 1px;
			height: 1px;
			overflow: hidden
		}

		/* ---- Read-only team name ---- */
		.team-name {
			font-family: var(--display);
			font-weight: 700;
			font-size: 20px;
			color: var(--ink);
		}

		.team-name.team-loading {
			font-size: 15px;
			font-weight: 600;
			color: var(--muted);
		}

		/* ---- Success ---- */
		.done {
			display: none;
			text-align: center;
			padding: 36px 24px
		}

		.done.show {
			display: block
		}

		.done .mark {
			width: 64px;
			height: 64px;
			border-radius: 50%;
			background: #EBF6EF;
			border: 2px solid #B9DBC8;
			display: flex;
			align-items: center;
			justify-content: center;
			margin: 0 auto 16px;
			font-size: 32px;
			color: var(--ok);
		}

		.done .mark.bad {
			background: var(--red-soft);
			border-color: var(--red-line);
			color: var(--red-ink);
		}

		.done h2 {
			font-family: var(--display);
			font-weight: 700;
			margin: 0 0 6px
		}

		.done p {
			color: var(--muted);
			margin: 0 auto;
			max-width: 420px
		}

		.summary {
			text-align: left;
			max-width: 420px;
			margin: 20px auto 0;
			background: var(--bg);
			border: 1px solid var(--line);
			border-radius: 10px;
			padding: 14px 16px;
			font-size: 14px;
		}

		.summary .row {
			display: flex;
			justify-content: space-between;
			padding: 3px 0
		}

		.summary .row span:last-child {
			font-weight: 700
		}

		.linkbtn {
			background: none;
			border: 1.5px solid var(--line);
			color: var(--primary);
			font-weight: 700;
			border-radius: 10px;
			padding: 11px 22px;
			margin-top: 22px;
			cursor: pointer;
			font-family: var(--body);
			font-size: 14px;
		}

		.linkbtn:hover {
			border-color: var(--primary);
			background: #F3F7FB
		}

		@media (max-width:520px) {
			.matchday {
				margin-left: 0;
				width: 100%;
				justify-content: flex-start
			}

			.opt {
				flex-wrap: wrap
			}
		}

		@media (prefers-reduced-motion:reduce) {
			* {
				transition: none !important
			}
		}
	</style>
</head>

<body>
	<div class="wrap">

		<header class="masthead">
			<div class="mast-top">
				<p class="eyebrow" data-i18n="eyebrow"></p>
			</div>
			<img class="event-logo" src="logo-completed-trasparente.png"
				alt="European Speed Skating Championships 2026 — 19–26 July 2026, Cardano al Campo, Italy">
		</header>

		<div id="formArea">
			<div class="daybar">
				<span class="lab" data-i18n="orderForDay"></span>
				<select id="daySelect" aria-label="Day"></select>
				<div class="matchday" id="matchday"></div>
			</div>

			<div class="card">
				<span class="field-label" data-i18n="countryLabel"></span>
				<div class="team-name team-loading" id="teamName" data-i18n="teamLoading"></div>
			</div>

			<div class="card">
				<span class="field-label" data-i18n="quantitiesLabel"></span>
				<div id="meals"></div>
			</div>

			<div class="card">
				<label class="field-label" for="notes" data-i18n="notesLabel"></label>
				<textarea id="notes" data-i18n-ph="notesPh"></textarea>
				<div class="hint" data-i18n="notesHint"></div>
			</div>

			<div class="hp"><label>Leave empty<input type="text" id="website" tabindex="-1" autocomplete="off"></label>
			</div>

			<div id="errBox" class="msg err"></div>

			<div class="footer-bar">
				<div class="total"><b id="totalCount">0</b><span data-i18n="mealsForDay"></span></div>
				<button class="btn" id="submitBtn" data-i18n="sendOrder"></button>
			</div>

			<p class="privacy" data-i18n="privacy"></p>
		</div>

		<div class="done" id="doneScreen">
			<div class="mark">✓</div>
			<h2 data-i18n="doneTitle"></h2>
			<p data-i18n="doneText"></p>
			<div class="summary" id="doneSummary"></div>
			<button class="linkbtn" id="againBtn" data-i18n="orderAnother"></button>
		</div>

		<div class="done" id="blockScreen">
			<div class="mark bad">✕</div>
			<h2 data-i18n="linkInvalidTitle"></h2>
			<p data-i18n="linkInvalidText"></p>
		</div>

	</div>

	<!-- Floating language switcher (IT / EN) -->
	<div class="lang-fab" id="langFab">
		<div class="lang-fab-menu" id="langFabMenu" role="menu">
			<button class="lang-fab-item" type="button" data-lang="en" role="menuitem"><span class="flagslot"></span>EN</button>
			<button class="lang-fab-item" type="button" data-lang="it" role="menuitem"><span class="flagslot"></span>IT</button>
		</div>
		<button class="lang-fab-btn" id="langFabBtn" type="button" aria-label="Select language" aria-expanded="false" aria-haspopup="true">
			<span class="flagslot" id="langFabFlag"></span>
			<span id="langFabLabel">EN</span>
		</button>
	</div>

		/**
		 * Returns today's date as an ISO string (YYYY-MM-DD) in local time.
		 * @returns {string}
		 */
		function todayIso() {
			const now = new Date();
			const year = now.getFullYear();
			const month = String(now.getMonth() + 1).padStart(2, "0");
			const day = String(now.getDate()).padStart(2, "0");
			return `${year}-${month}-${day}`;
		}

		// Only today and future days can be ordered: days already past are removed
		// from the picker. ISO date strings (YYYY-MM-DD) compare correctly with a
		// plain lexicographic >=, so no Date parsing is needed here.
		const TODAY_ISO = todayIso();
		const SELECTABLE_DAYS = MENU.filter(day => day.iso >= TODAY_ISO);

		SELECTABLE_DAYS.forEach(day => { const o = document.createElement("option"); o.value = day.iso; daySelect.appendChild(o); });

		/* ============================================================

		function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }
		function dparts(iso) {
			const [y, m, d] = iso.split("-").map(Number);
			const dt = new Date(y, m - 1, d), loc = LOCALE[lang];
			return {
				wd: cap(dt.toLocaleDateString(loc, { weekday: "short" }).replace(".", "")),
				d: String(d),
				mo: cap(dt.toLocaleDateString(loc, { month: "long" }))
			};
		}
		function optLabel(key) {
			const word = key[0] === "l" ? I18N[lang].lunch : I18N[lang].dinner;
			return word + " " + key[1];

		/**
		 * Returns inline SVG markup for a national flag, sized for the FAB.
		 * SVG (not emoji) is used so the flags render identically on every OS,
		 * including Windows, where flag emoji fall back to plain letters.
		 * The `uid` suffix keeps the Union Jack's internal clipPath id unique
		 * when the same flag is rendered more than once on the page.
		 * @param {"it"|"en"} code  language code
		 * @param {string} uid  unique suffix for internal SVG ids
		 * @returns {string} SVG markup
		 */
		function flagSvg(code, uid) {
			if (code === "it") {
				return '<svg class="flag" viewBox="0 0 3 2" aria-hidden="true">' +
					'<rect width="3" height="2" fill="#fff"/>' +
					'<rect width="1" height="2" x="0" fill="#009246"/>' +
					'<rect width="1" height="2" x="2" fill="#ce2b37"/></svg>';
			}
			// United Kingdom (Union Jack) for English.
			const clipId = "ukclip-" + uid;
			return '<svg class="flag" viewBox="0 0 60 30" aria-hidden="true">' +
				'<clipPath id="' + clipId + '"><path d="M0,0 v15 h30 v15 z M60,0 v15 h-30 v15 z"/></clipPath>' +
				'<path d="M0,0 v30 h60 v-30 z" fill="#012169"/>' +
				'<path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/>' +
				'<path d="M0,0 L60,30 M60,0 L0,30" clip-path="url(#' + clipId + ')" stroke="#C8102E" stroke-width="4"/>' +
				'<path d="M30,0 v30 M0,15 h60" stroke="#fff" stroke-width="10"/>' +
				'<path d="M30,0 v30 M0,15 h60" stroke="#C8102E" stroke-width="6"/></svg>';
		}

			});

		/** Syncs the FAB main button (flag + label) and the active menu item with `lang`. */
		function updateLangFab() {

			document.querySelectorAll("[data-i18n-ph]").forEach(el => { el.placeholder = t[el.dataset.i18nPh]; });

			updateLangFab();
		}

		function fillDaySelect() {
			Array.from(daySelect.options).forEach(opt => {

		function renderDay(iso) {
			currentDay = MENU.find(d => d.iso === iso) || MENU[0];
			daySelect.value = currentDay.iso;
			qty = {}; ORDER_KEYS.forEach(k => qty[k] = 0);

			const p = dparts(currentDay.iso);
			matchday.innerHTML = `<span class="wd">${p.wd}</span><span class="dt">${p.d}</span><span class="mo">${p.mo}</span>`;

			mealsEl.innerHTML = "";
			let lunchDone = false, dinnerDone = false;
			ORDER_KEYS.forEach(key => {
				const opt = currentDay.opts[key];
				if (!opt) return;
				const isLunch = key[0] === "l";
				if (isLunch && !lunchDone) { mealsEl.appendChild(mealHead("lunch")); lunchDone = true; }
				if (!isLunch && !dinnerDone) { mealsEl.appendChild(mealHead("dinner")); dinnerDone = true; }
				mealsEl.appendChild(optionRow(key, opt[lang], isLunch));
			});
			updateTotal();

			const u = new URL(window.location); u.searchParams.set("giorno", currentDay.iso);
			history.replaceState(null, "", u);
		}

		function mealHead(type) {
			const div = document.createElement("div");

			div.style.marginTop = type === "dinner" ? "18px" : "4px";

		}

		function optionRow(key, dishes, isLunch) {
			const isVeg = key[1] === "3";

			info.innerHTML =

			row.appendChild(info);
			row.appendChild(stepper(key));
			return row;
		}

		function stepper(key) {
			const s = document.createElement("div"); s.className = "stepper";
			const minus = document.createElement("button"); minus.type = "button"; minus.className = "minus"; minus.textContent = "−"; minus.setAttribute("aria-label", optLabel(key) + " −");
			const inp = document.createElement("input"); inp.type = "number"; inp.min = "0"; inp.max = "100"; inp.value = String(qty[key]); inp.inputMode = "numeric"; inp.setAttribute("aria-label", optLabel(key));
			const plus = document.createElement("button"); plus.type = "button"; plus.className = "plus"; plus.textContent = "+"; plus.setAttribute("aria-label", optLabel(key) + " +");

			minus.onclick = () => set(qty[key] - 1);
			plus.onclick = () => set(qty[key] + 1);
			inp.oninput = () => set(inp.value);
			s.append(minus, inp, plus);
			return s;
		}

		function updateTotal() { totalCount.textContent = ORDER_KEYS.reduce((a, k) => a + (qty[k] || 0), 0); }

		/* ---- Language FAB: open/close the menu and pick a language ---- */
		const langFab = document.getElementById("langFab");
		const langFabBtn = document.getElementById("langFabBtn");

		function openFabMenu() {
			langFabMenu.style.display = "flex";
			// Wait one frame so the display change is committed before adding the
			// .open class, otherwise the opacity/transform transition is skipped.
			requestAnimationFrame(() => {
				langFabMenu.classList.add("open");

			});

			if (!langFabMenu.classList.contains("open")) return;
			langFabMenu.classList.remove("open");

			// Hide the menu only after the closing transition ends, so it stays
			// visible while it animates out.
			langFabMenu.addEventListener("transitionend", function onEnd(e) {
				if (e.propertyName !== "opacity") return;
				// Guard against a fast reopen: only hide if the menu is still closed
				// when the transition ends.
				if (!langFabMenu.classList.contains("open")) langFabMenu.style.display = "none";
				langFabMenu.removeEventListener("transitionend", onEnd);
			});
		}

			e.stopPropagation();
			if (langFabMenu.classList.contains("open")) {

		/* ---- Keep the language FAB clear of the sticky footer bar ---- */
		/**
		 * On narrow screens the floating language button and the sticky
		 * "Send order" bar share the bottom-right corner and overlap. This lifts
		 * the FAB so it always sits just above the footer bar. On wide screens
		 * the centered footer bar never reaches under the FAB, so the base 20px
		 * CSS offset is kept. The footer bar height is measured live because it
		 * changes with the viewport width and the current language.
		 */
		const footerBar = document.querySelector(".footer-bar");
		const FAB_GAP = 12; // px kept between the FAB and the footer bar

		function positionLangFab() {
			// The FAB horizontal position does not depend on its `bottom`, so it
			// is safe to read even while we are about to change `bottom`.
			const fabRect = langFab.getBoundingClientRect();
			const barRect = footerBar.getBoundingClientRect();
			const overlapsHorizontally = fabRect.left < barRect.right && fabRect.right > barRect.left;
			if (overlapsHorizontally) {
				langFab.style.bottom = (barRect.height + FAB_GAP) + "px";
			} else {
				langFab.style.bottom = ""; // fall back to the CSS default (20px)
			}
		}

		window.addEventListener("resize", positionLangFab);

		new ResizeObserver(positionLangFab).observe(footerBar);

		async function submit() {
			const t = I18N[lang];
			errBox.style.display = "none";
			// Safety net: without a resolved team the form should already be blocked.
			if (!teamCountry) { blockAccess(); return; }
			const total = ORDER_KEYS.reduce((a, k) => a + (qty[k] || 0), 0);
			if (total === 0) { showErr(t.errQty); return; }
			if (document.getElementById("website").value) return;

			const payload = {
				// The server derives the country from the token; `country` is sent
				// only so it can be shown in the confirmation summary below.
				token: token,
				country: teamCountry, date: currentDay.iso,
				dayLabel: (() => { const p = dparts(currentDay.iso); return `${p.wd} ${p.d} ${p.mo}`; })(),
				l1: qty.l1, l2: qty.l2, l3: qty.l3, d1: qty.d1, d2: qty.d2, d3: qty.d3,
				notes: document.getElementById("notes").value.trim(), website: ""
			};

			submitBtn.disabled = true; submitBtn.textContent = t.sending;

			if (SCRIPT_URL.indexOf("INCOLLA") !== -1) { setTimeout(() => showDone(payload, true), 500); return; }

			try {
				const res = await fetch(SCRIPT_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(payload), redirect: "follow" });
				const out = await res.json();
				if (out.status === "success") { showDone(payload, false); }
				else { throw new Error(out.message || "Server error"); }
			} catch (err) {
				submitBtn.disabled = false; submitBtn.textContent = t.sendOrder;
				showErr(t.errSend + " (" + err.message + ")");
			}
		}

		function showErr(m) { errBox.textContent = m; errBox.style.display = "block"; }

		function showDone(p, demo) {
			const t = I18N[lang], rows = [];
			rows.push(row(t.country, p.country));
			rows.push(row(t.day, p.dayLabel));
			ORDER_KEYS.forEach(k => { if (p[k] > 0) rows.push(row(optLabel(k), p[k])); });
			rows.push(row(t.totalMeals, ORDER_KEYS.reduce((a, k) => a + p[k], 0)));
			document.getElementById("doneSummary").innerHTML = rows.join("");
			document.getElementById("formArea").style.display = "none";
			const done = document.getElementById("doneScreen"); done.classList.add("show");
			if (demo) { done.querySelector("p").textContent = t.demoText; }
			window.scrollTo({ top: 0, behavior: "smooth" });
		}
		function row(a, b) { return `<div class="row"><span>${a}</span><span>${b}</span></div>`; }

		document.getElementById("againBtn").addEventListener("click", () => {
			submitBtn.disabled = false; submitBtn.textContent = I18N[lang].sendOrder;
			document.getElementById("notes").value = "";
			document.getElementById("doneScreen").classList.remove("show");
			document.getElementById("formArea").style.display = "";
			document.querySelector('.done p').textContent = I18N[lang].doneText;
			renderDay(currentDay.iso);
		});

		/* ============================================================
		   8) TOKEN — resolve the national team from ?t= (server-side check)
		   ============================================================ */
		/**
		 * Reads the token from ?t=, asks the server which team it belongs to and
		 * unlocks the form. Security note: the real check happens server-side on
		 * submit; here we only resolve the display name. If the token is missing
		 * or invalid, the whole form is blocked (option A).
		 * @returns {Promise<void>}
		 */
		async function resolveTeam() {
			token = new URL(window.location).searchParams.get("t") || "";

			// Demo mode: SCRIPT_URL not configured yet -> skip the server check so
			// the page can still be previewed offline.
			if (SCRIPT_URL.indexOf("INCOLLA") !== -1) { showTeam("Demo"); return; }

			if (!token) { blockAccess(); return; }

			try {
				const res = await fetch(SCRIPT_URL + "?t=" + encodeURIComponent(token), { method: "GET" });
				const out = await res.json();
				if (out.status === "ok" && out.country) { showTeam(out.country); }
				else { blockAccess(); }
			} catch (err) {
				blockAccess();
			}
		}

		/**
		 * Shows the resolved team name (read-only) and enables submission.
		 * @param {string} name English country name returned by the server
		 */
		function showTeam(name) {
			teamCountry = name;
			teamNameEl.textContent = name;
			teamNameEl.classList.remove("team-loading");
			// Drop the i18n binding so a later language switch does not overwrite
			// the resolved name with the "Checking link…" placeholder.
			teamNameEl.removeAttribute("data-i18n");
			submitBtn.disabled = false;
		}

		/** Hides the form and shows the "invalid link" screen. */
		function blockAccess() {
			document.getElementById("formArea").style.display = "none";
			document.getElementById("doneScreen").classList.remove("show");
			document.getElementById("blockScreen").classList.add("show");
		}

		/* ============================================================
		   9) INIT — language from ?lang= or browser; day from ?giorno=
		   ============================================================ */
		(async function init() {
			const params = new URL(window.location).searchParams;
			const qlang = params.get("lang");
			lang = (qlang === "it" || qlang === "en") ? qlang : ((navigator.language || "en").toLowerCase().startsWith("it") ? "it" : "en");
			initFabFlags();
			applyStaticI18n();
			fillDaySelect();
			submitBtn.textContent = I18N[lang].sendOrder;
			submitBtn.disabled = true;   // stays locked until the token is verified
			const startIso = params.get("giorno");
			const defaultIso = SELECTABLE_DAYS.length ? SELECTABLE_DAYS[0].iso : MENU[0].iso;
			renderDay(SELECTABLE_DAYS.some(d => d.iso === startIso) ? startIso : defaultIso);
			await resolveTeam();
		})();
	</script>
</body>

</html>
